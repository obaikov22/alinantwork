name: alinantwork
description: "AlinaNTWork - Team leave tracker for night shift supervisor"
publish_to: 'none'

version: 1.0.4+5

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.8.1

  # Firebase (configured later)
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5

  # UI
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.3.2

  # Auto-update
  package_info_plus: ^8.0.0
  dio: ^5.0.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation for Hive models
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

  # App icon generation
  flutter_launcher_icons: ^0.14.3

  # Splash screen generation
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - background.png
    - assets/images/

flutter_native_splash:
  color: "#0b0c18"
  image: background.png
  android: true
  ios: true
  fullscreen: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0b0c18"
  adaptive_icon_foreground: "icon.png"
